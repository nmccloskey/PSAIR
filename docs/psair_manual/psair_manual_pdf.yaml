# ==========================================================
# PSAIR Documentation Tools Instruction Manual - PDF Compilation Config
# ==========================================================

title: "PSAIR Instruction Manual"
subtitle: "Python Scaffolding for Analysis Itineraries in Research"
author: "Nick McCloskey"
version: "{package_version}"
date: "Version {version}"

geometry: margin=3cm
fontsize: 11pt
linestretch: 1.15
papersize: letter

titlepage: true
titlepage-color: "FFFFFF"
titlepage-text-color: "000000"
titlepage-rule-height: 1

toc: true
toc-depth: 3
numbersections: true

header-includes:
  - \usepackage{etoolbox}
  - \apptocmd{\tableofcontents}{\clearpage}{}{}
  - \usepackage{fancyhdr}
  - \pagestyle{fancy}
  - \fancyfoot[C]{\thepage}
  - \fancyhead[L]{title}
  - \fancyhead[R]{date}
  - \usepackage{fvextra}
  - \fvset{breaklines=true,breakanywhere=true}

colorlinks: true
linkcolor: blue
urlcolor: blue

highlight-style: tango
